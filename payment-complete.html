<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Confirmed | Rainy Days</title>
    <link rel="icon" href="images/logo.png" type="image/png" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="payment-complete.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="page-payment-complete">
    <div class="top-bar">
      <p>Free shipping over 1000 NOK</p>
      <div class="top-bar-right">
        <a href="">Sign In</a>
        <a href="#" class="language-switch">NO | EN</a>
      </div>
    </div>

    <main class="payment-complete-main">
      <section class="payment-complete-section">
        <div class="payment-complete-icon">
          <i class="fa-solid fa-check"></i>
        </div>

        <h1>Payment confirmed</h1>

        <p>
          Thank you for your purchase. Soon you will get the shipping
          information via email.
        </p>

        <div class="payment-complete-actions">
          <a href="men.html" class="continue-shopping-btn">Continue Shopping</a>
          <a href="index.html" class="home-page-btn">Home Page</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-column footer-brand">
        <h3>RAINY DAYS</h3>
        <p class="footer-tagline">Pushing the Comfort Zone</p>

        <div class="footer-address">
          <p>Address 123,</p>
          <p>Post 12</p>
        </div>

        <div class="social-icons">
          <a href="#"><i class="fa-brands fa-facebook"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-linkedin"></i></a>
        </div>
      </div>

      <div class="footer-column footer-links">
        <a href="index.html">Home</a>
        <a href="men.html">Shop</a>
        <a href="">Blog</a>
      </div>

      <div class="footer-column footer-newsletter">
        <h4>Subscribe to Newsletter</h4>
        <form class="newsletter-form" action="newsletter.html">
          <input type="email" />
          <button type="submit">Join</button>
        </form>
      </div>
    </footer>

    <div class="copyright">@ 2026 Klevis</div>
  </body>
</html>
